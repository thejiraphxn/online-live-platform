# Render Blueprint — backend only (API + embedded worker + Redis).
# Frontend (Next.js) is deployed to Vercel separately.
#
# Everything fits on Render's free tier when:
#   - External Postgres (use your own — Supabase, Neon, your VPS, etc.)
#   - EMBED_WORKER=true (worker runs in the API process)
#   - UptimeRobot or cron-job.org pinging /ping every 10 minutes
#
# Set env vars marked `sync: false` in the Render Dashboard after Blueprint
# creates the services. Vercel has its own env config (see README / deploy guide).

services:
  # --- Redis (BullMQ + Socket.IO) ---
  - type: keyvalue
    name: olp-redis
    plan: free
    ipAllowList: [] # private to Render services

  # --- Express API + Socket.IO + embedded BullMQ worker ---
  - type: web
    name: olp-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "4000"
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: EMBED_WORKER
        value: "true"
      # Postgres — external (set in Dashboard)
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          name: olp-redis
          type: keyvalue
          property: connectionString
      # Cross-site cookies because Render gives olp-web + olp-api different
      # origins. Both must be HTTPS (Render default) and SameSite=None.
      - key: CORS_ORIGIN
        sync: false
      - key: COOKIE_SECURE
        value: "true"
      # SameSite=lax is fine because the Vercel frontend proxies /api/* to
      # this service via Next.js rewrites — so the cookie is first-party
      # from the browser's POV (stored on the Vercel domain).
      - key: COOKIE_SAMESITE
        value: lax
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      # AWS S3
      - key: S3_ENDPOINT
        sync: false
      - key: PUBLIC_S3_ENDPOINT
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_FORCE_PATH_STYLE
        value: "false"
      # Whisper (Groq free tier)
      - key: WHISPER_API_KEY
        sync: false
      - key: WHISPER_API_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: WHISPER_MODEL
        value: whisper-large-v3
      # Groq's hosted Whisper caps uploads at 25 MB. Bump only if you run
      # a self-hosted Whisper (faster-whisper-server) behind WHISPER_API_BASE_URL.
      - key: WHISPER_MAX_UPLOAD_MB
        value: "25"
      # LLM (Ollama Cloud / Groq)
      - key: LLM_API_URL
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        sync: false
      # FFmpeg tuning for 512MB RAM
      - key: FFMPEG_PRESET
        value: ultrafast
      - key: FFMPEG_CRF
        value: "30"

# Note: the Next.js frontend lives on Vercel, not Render. See the deploy
# guide for Vercel env setup.
