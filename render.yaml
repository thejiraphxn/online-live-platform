# Render Blueprint — single-process API + embedded worker + Next.js frontend.
#
# Everything fits on Render's free tier when:
#   - External Postgres (use your own — Supabase, Neon, your VPS, etc.)
#   - EMBED_WORKER=true (worker runs in the API process)
#   - UptimeRobot or cron-job.org pinging /ping every 10 minutes
#
# Set the env vars marked `sync: false` in the Render Dashboard after the
# Blueprint creates the services.

services:
  # --- Redis (BullMQ + Socket.IO) ---
  - type: keyvalue
    name: olp-redis
    plan: free
    ipAllowList: [] # private to Render services

  # --- Express API + Socket.IO + embedded BullMQ worker ---
  - type: web
    name: olp-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "4000"
      - key: NODE_ENV
        value: production
      - key: EMBED_WORKER
        value: "true"
      # Postgres — external (set in Dashboard)
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          name: olp-redis
          type: keyvalue
          property: connectionString
      # Cross-site cookies because Render gives olp-web + olp-api different
      # origins. Both must be HTTPS (Render default) and SameSite=None.
      - key: CORS_ORIGIN
        sync: false
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: none
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      # AWS S3
      - key: S3_ENDPOINT
        sync: false
      - key: PUBLIC_S3_ENDPOINT
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_FORCE_PATH_STYLE
        value: "false"
      # Whisper (Groq free tier)
      - key: WHISPER_API_KEY
        sync: false
      - key: WHISPER_API_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: WHISPER_MODEL
        value: whisper-large-v3
      # LLM (Ollama Cloud / Groq)
      - key: LLM_API_URL
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        sync: false
      # FFmpeg tuning for 512MB RAM
      - key: FFMPEG_PRESET
        value: ultrafast
      - key: FFMPEG_CRF
        value: "30"

  # --- Next.js frontend ---
  - type: web
    name: olp-web
    runtime: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /login
    envVars:
      - key: NODE_ENV
        value: production
      # These are baked into the bundle at Docker build time. If you rename
      # the api service, re-deploy the web service to rebake.
      - key: NEXT_PUBLIC_API_BASE
        sync: false # set to https://olp-api.onrender.com/api/v1
      - key: NEXT_PUBLIC_SOCKET_URL
        sync: false # set to https://olp-api.onrender.com
      - key: BACKEND_URL
        sync: false # set to https://olp-api.onrender.com
